<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Test - MXSA Trainer</title>
    <link rel="stylesheet" href="/static/css/trainer.css">
    <style>
        .test-container {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }
        .prediction-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .prediction-label {
            font-size: 2.5rem;
            font-weight: 800;
            color: #00d4ff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .confidence-label {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 10px;
        }
        #nav-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
        }
        #nav-back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <a id="nav-back" href="/">← Back to Trainer</a>
        
        <div class="card">
            <div class="card-header">
                <h2><span class="icon">👁️</span> live AI vision test</h2>
            </div>
            <div class="card-body">
                <div class="video-wrapper">
                    <video id="live-video" autoplay playsinline muted></video>
                </div>
                
                <div class="prediction-box">
                    <p class="confidence-label">I think I see...</p>
                    <h1 class="prediction-label" id="prediction-text">Waiting...</h1>
                    <p class="confidence-label" id="confidence-text">Confidence: --%</p>
                </div>

                <button class="btn btn-primary" style="margin-top:20px;" onclick="startCamera()" id="start-btn">Start Camera</button>
            </div>
        </div>
    </div>

    <!-- Hidden canvas for taking snapshots -->
    <canvas id="hidden-canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('live-video');
        const canvas = document.getElementById('hidden-canvas');
        const predictionText = document.getElementById('prediction-text');
        const confidenceText = document.getElementById('confidence-text');
        const startBtn = document.getElementById('start-btn');
        let stream = null;
        let predictInterval = null;

        async function startCamera() {
            if (stream) return;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Camera API is not supported in this browser or context (HTTPS required).");
                return;
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280, max: 1920 }, height: { ideal: 720, max: 1080 }, frameRate: { ideal: 30, max: 60 } } });
                video.srcObject = stream;
                startBtn.style.display = 'none';
                predictionText.innerText = "Analyzing...";
                
                // Start prediction loop
                predictInterval = setInterval(sendFrame, 500); // 2 FPS
            } catch (err) {
                console.error("Camera error:", err);
                alert("Could not access camera: " + err.message);
            }
        }

        async function sendFrame() {
            if (!video.videoWidth) return;
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            
            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: dataUrl })
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const data = await res.json();
                if (data.error) {
                    console.error("Prediction error:", data.error);
                } else {
                    predictionText.innerText = data.label;
                    confidenceText.innerText = `Confidence: ${data.confidence}%`;
                    
                    if(data.confidence > 70) {
                        predictionText.style.color = '#00ff88'; // green for high confidence
                    } else if(data.confidence > 40) {
                        predictionText.style.color = '#ffd700'; // gold for medium
                    } else {
                        predictionText.style.color = '#ff4444'; // red for low
                    }
                }
            } catch (err) {
                console.error("Network error:", err);
            }
        }

        // Clean up when leaving page
        window.addEventListener('beforeunload', () => {
            if (predictInterval) clearInterval(predictInterval);
            if (stream) stream.getTracks().forEach(t => t.stop());
        });
    </script>
</body>
</html>
